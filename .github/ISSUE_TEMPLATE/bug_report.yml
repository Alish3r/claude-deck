name: Bug Report
description: Report a bug or regression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        **Tickets must be retraceable** — not a title plus two lines. A future reader (or AI) should understand *what* broke, *why* it matters, *how to reproduce*, and *how we will know it is fixed*. See `.claude/rules/issue-driven-workflow.md`.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug, user impact, and where it shows up (several short paragraphs minimum — not a single sentence).
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug. If truly not applicable (e.g. typo in static text), write **N/A** and one sentence explaining why.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: verify
    attributes:
      label: How we will verify the fix
      description: Commands, URLs, queries, or checks someone else can run after the fix (links to logs or screenshots if helpful).
    validations:
      required: true

  - type: textarea
    id: related_issues
    attributes:
      label: Related issues and overlap check
      description: |
        List every related issue (`#nnn`) — parent epic, split tasks, dependencies, prior attempts.
        If none after searching open/recent issues for duplicates, write **Related: none** and briefly note what you searched (keywords or `gh issue list --search`).
      placeholder: |
        Related: #210, #224
        Overlap search: searched "daily report", "reports-gen"; no duplicate.
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - patch
        - companion
        - plugin
        - hub
        - lcd
        - docs
        - ops
        - security
        - research
        - ux
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "critical — system crash, data loss, or security breach"
        - "high — major feature broken, significant user impact"
        - "medium — feature degraded, workaround exists"
        - "low — minor issue, cosmetic or edge case"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated effort
      options:
        - "XS — <0.5 AI credits"
        - "S — 0.5-1 AI credits"
        - "M — 1-3 AI credits"
        - "L — 3-8 AI credits"
        - "XL — 8+ AI credits"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, environment details.
    validations:
      required: false
